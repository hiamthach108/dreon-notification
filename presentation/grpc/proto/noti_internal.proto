syntax = "proto3";

package dreon.notification.internal.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/hiamthach108/dreon-notification/presentation/grpc/gen/proto;notiinternal";

// NotiInternalService exposes internal gRPC RPCs for notification management. Not intended for public consumption.
service NotiInternalService {
  // SendNotification sends a notification to a user.
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
}

// SendNotificationRequest mirrors aggregate.SendNotificationReq.
message SendNotificationRequest {
  string idempotencyKey = 1;
  string source = 2;
  string channel = 3;
  string type = 4;
  string title = 5;
  string message = 6;
  repeated string recipients = 7;
  map<string, string> params = 8;
  google.protobuf.Timestamp scheduledAt = 9;
  google.protobuf.Timestamp expiredAt = 10;
}

// SendNotificationResponse mirrors aggregate.SendNotificationResp.
message SendNotificationResponse {
  string notificationId = 1;
}